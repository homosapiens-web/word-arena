<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>單字卡牌大亂鬥 Word Arena</title>
  
  <!-- 載入 Tailwind CSS 來處理畫面排版與美化 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 載入 React 核心引擎 (透過 CDN 讓 HTML 能直接跑 React) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans pb-20 selection:bg-indigo-500">
  
  <!-- 網頁內容的渲染容器 -->
  <div id="root">
    <div class="min-h-screen flex items-center justify-center">
      <div class="text-indigo-400 font-bold text-xl animate-pulse flex flex-col items-center">
        <span class="text-4xl mb-4">✨</span>
        正在載入遊戲引擎...
      </div>
    </div>
  </div>

  <!-- 載入 Firebase 雲端資料庫模組 -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, updateDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    // 把 Firebase 功能掛載到全域環境，讓底下的 React 可以呼叫
    window.FB = {
      initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged,
      getFirestore, collection, doc, setDoc, onSnapshot, addDoc, updateDoc
    };
    // 發出載入完成的通知
    window.dispatchEvent(new Event('firebaseLoaded'));
  </script>

  <!-- 遊戲主程式 (使用 Babel 即時編譯 React 語法) -->
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // 啟動應用程式的函式
    function startApp() {
      const { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore, collection, doc, setDoc, onSnapshot, addDoc, updateDoc } = window.FB;

      // 檢查是否為本地開啟 (判斷有沒有外部傳入的 Firebase 設定)
      const isLocal = typeof __firebase_config === 'undefined';
      const appId = typeof __app_id !== 'undefined' ? __app_id : 'hangman-card-battler';
      let app, auth, db;

      // 如果有雲端設定，就初始化 Firebase
      if (!isLocal) {
        app = initializeApp(JSON.parse(__firebase_config));
        auth = getAuth(app);
        db = getFirestore(app);
      }

      // --- 主應用程式元件 ---
      function App() {
        // 如果是本地模式，給一個虛擬的玩家 ID
        const [user, setUser] = useState(isLocal ? { uid: 'local-tester' } : null);
        const [cards, setCards] = useState([]);
        const [activeTab, setActiveTab] = useState('hangman'); 
        const [loadingText, setLoadingText] = useState(isLocal ? "" : "正在連線至伺服器...");

        // 1. 初始化驗證
        useEffect(() => {
          if (isLocal) return; // 本地模式不需要連線驗證

          const initAuth = async () => {
            try {
              if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
              } else {
                await signInAnonymously(auth);
              }
            } catch (err) {
              console.error("連線錯誤:", err);
            }
          };
          initAuth();

          const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
            setUser(currentUser);
            if (currentUser) setLoadingText("");
          });
          return () => unsubscribe();
        }, []);

        // 2. 獲取卡牌資料
        useEffect(() => {
          if (isLocal) {
            // 本地模式：預先給一張歡迎卡牌
            setCards([{
              id: 'demo-card', word: 'welcome', translation: '歡迎 (單機模式)', stars: 4, hp: 150, atk: 60, isNew: true, createdAt: Date.now()
            }]);
            return;
          }
          if (!user) return;

          const cardsRef = collection(db, 'artifacts', appId, 'users', user.uid, 'cards');
          const unsubscribe = onSnapshot(cardsRef, (snapshot) => {
            const loadedCards = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
            loadedCards.sort((a, b) => b.createdAt - a.createdAt); // 依獲得時間排序
            setCards(loadedCards);
          }, (error) => console.error("抓取卡牌錯誤:", error));

          return () => unsubscribe();
        }, [user]);

        const hasFirstWin = cards.length > 0;
        const hasEnoughCardsForArena = cards.length >= 3;
        const unseenCount = cards.filter(c => c.isNew).length;

        // 標記卡牌已讀 (消滅紅點)
        const markCardAsSeen = async (cardId) => {
          if (isLocal) {
            setCards(prev => prev.map(c => c.id === cardId ? { ...c, isNew: false } : c));
            return;
          }
          if (!user) return;
          try {
            const cardRef = doc(db, 'artifacts', appId, 'users', user.uid, 'cards', cardId);
            await updateDoc(cardRef, { isNew: false });
          } catch (e) {
            console.error("更新卡牌狀態失敗", e);
          }
        };

        if (!user) {
          return <div className="min-h-screen flex items-center justify-center font-bold">{loadingText}</div>;
        }

        return (
          <div>
            <header className="bg-slate-800 p-4 shadow-md text-center border-b border-slate-700 sticky top-0 z-10">
              <h1 className="text-2xl font-black bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">
                📝 單字大亂鬥 {isLocal && <span className="text-xs text-yellow-400 bg-slate-700 px-2 py-0.5 rounded ml-2">單機版</span>}
              </h1>
              <div className="text-xs text-slate-400 mt-1">目前收集卡牌: {cards.length} 張</div>
            </header>

            <main className="p-4 max-w-4xl mx-auto">
              {activeTab === 'hangman' && <HangmanGame user={user} setCards={setCards} />}
              {activeTab === 'library' && <LibraryView cards={cards} markCardAsSeen={markCardAsSeen} />}
              {activeTab === 'arena' && <ArenaView user={user} cards={cards} />}
            </main>

            {hasFirstWin && (
              <nav className="fixed bottom-0 w-full bg-slate-800 border-t border-slate-700 flex justify-around p-3 z-50">
                <TabButton active={activeTab === 'hangman'} onClick={() => setActiveTab('hangman')} icon="🎮" label="猜單字" />
                <TabButton active={activeTab === 'library'} onClick={() => setActiveTab('library')} icon="🎴" label="卡牌庫" badge={unseenCount} />
                <TabButton active={activeTab === 'arena'} onClick={() => hasEnoughCardsForArena ? setActiveTab('arena') : alert('需要至少 3 張卡牌才能進入競技場！')} icon="⚔️" label="競技場" locked={!hasEnoughCardsForArena} />
              </nav>
            )}
          </div>
        );
      }

      // --- 底部導航按鈕 ---
      function TabButton({ active, onClick, icon, label, locked, badge }) {
        return (
          <button onClick={onClick} className={`flex flex-col items-center justify-center w-24 p-2 rounded-xl transition-all relative ${active ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-500/30' : 'text-slate-400 hover:bg-slate-700'} ${locked ? 'opacity-50 cursor-not-allowed' : ''}`}>
            <span className="text-xl mb-1">{locked ? '🔒' : icon}</span>
            <span className="text-xs font-bold">{label}</span>
            {badge > 0 && !active && (
              <span className="absolute top-0 right-2 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full shadow-md animate-pulse">{badge}</span>
            )}
          </button>
        );
      }

      // --- 猜單字遊戲 ---
      function HangmanGame({ user, setCards }) {
        const [targetWord, setTargetWord] = useState('');
        const [guessedLetters, setGuessedLetters] = useState([]);
        const [mistakes, setMistakes] = useState(0);
        const maxMistakes = 6;
        const [status, setStatus] = useState('loading');
        const [newCard, setNewCard] = useState(null);

        const fetchNewWord = async () => {
          setStatus('loading'); setGuessedLetters([]); setMistakes(0); setNewCard(null);
          try {
            const isCommon = Math.random() > 0.4;
            let word = "";
            if (isCommon) {
              const topics = ["animal", "food", "nature", "science", "sports", "technology", "music", "magic", "sword", "dragon", "study", "space", "computer"];
              const randomTopic = topics[Math.floor(Math.random() * topics.length)];
              const res = await fetch(`https://api.datamuse.com/words?ml=${randomTopic}&max=100`);
              const data = await res.json();
              const validWords = data.filter(i => i.word.length >= 4 && i.word.length <= 9 && /^[a-z]+$/.test(i.word));
              word = validWords[Math.floor(Math.random() * validWords.length)].word;
            } else {
              const len = Math.floor(Math.random() * 5) + 4;
              const res = await fetch(`https://random-word-api.herokuapp.com/word?length=${len}`);
              const data = await res.json();
              word = data[0].toLowerCase();
            }
            setTargetWord(word); setStatus('playing');
          } catch (err) {
            setTargetWord('error'); setStatus('playing');
          }
        };

        useEffect(() => { fetchNewWord(); }, []);

        const guess = (letter) => {
          if (status !== 'playing' || guessedLetters.includes(letter)) return;
          const newGuessed = [...guessedLetters, letter];
          setGuessedLetters(newGuessed);

          if (!targetWord.includes(letter)) {
            const newMistakes = mistakes + 1;
            setMistakes(newMistakes);
            if (newMistakes >= maxMistakes) handleGameEnd(false);
          } else {
            const isWin = targetWord.split('').every(char => newGuessed.includes(char));
            if (isWin) handleGameEnd(true);
          }
        };

        useEffect(() => {
          const handleKeyDown = (e) => {
            const key = e.key.toLowerCase();
            if (status === 'playing' && /^[a-z]$/.test(key)) guess(key);
            else if ((status === 'won' || status === 'lost') && e.key === 'Enter') fetchNewWord();
          };
          window.addEventListener('keydown', handleKeyDown);
          return () => window.removeEventListener('keydown', handleKeyDown);
        }, [status, guessedLetters, targetWord, mistakes]);

        const handleGameEnd = async (isWin) => {
          setStatus('fetching_info');
          try {
            // 查字典與翻譯
            const dictRes = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${targetWord}`);
            let dictData = null; let meaningsCount = 1; let posSet = new Set(['noun']);
            if (dictRes.ok) {
              const data = await dictRes.json();
              dictData = data[0];
              meaningsCount = dictData.meanings.reduce((acc, curr) => acc + curr.definitions.length, 0);
              dictData.meanings.forEach(m => posSet.add(m.partOfSpeech));
            }

            const transRes = await fetch(`https://api.mymemory.translated.net/get?q=${targetWord}&langpair=en|zh-TW`);
            const transData = await transRes.json();
            let translation = transData.responseData?.translatedText || "未知";
            if (translation.toLowerCase() === targetWord.toLowerCase()) translation = "稀有詞彙(無翻譯)";

            // 計算數值
            const wordLen = targetWord.length;
            const posCount = posSet.size;
            let stars = Math.min(6, Math.max(1, Math.floor(wordLen / 2) + (posCount > 2 ? 1 : 0) + (Math.random() > 0.8 ? 1 : 0)));
            const hp = (wordLen * 20) + (posCount * 50) + (stars * 10) + Math.floor(Math.random() * 50);
            const atk = (meaningsCount * 15) + (stars * 30) + Math.floor(Math.random() * 20);

            const cardData = {
              word: targetWord, translation, stars, hp, atk,
              meanings: dictData ? dictData.meanings.map(m => ({
                pos: m.partOfSpeech, defs: m.definitions.slice(0, 2).map(d => d.definition)
              })) : [{ pos: 'unknown', defs: ['No detailed definition found.'] }],
              createdAt: Date.now(), isNew: true
            };

            if (isWin) {
              if (isLocal) {
                // 單機模式直接存入狀態
                setCards(prev => [...prev, { ...cardData, id: Date.now().toString() }]);
              } else if (user) {
                // 雲端模式存入資料庫
                const cardsRef = collection(db, 'artifacts', appId, 'users', user.uid, 'cards');
                await addDoc(cardsRef, cardData);
              }
            }
            setNewCard(cardData); setStatus(isWin ? 'won' : 'lost');
          } catch (err) {
            console.error(err); setStatus(isWin ? 'won' : 'lost');
          }
        };

        return (
          <div className="flex flex-col items-center">
            {/* 絞刑架視覺 */}
            <div className="w-48 h-48 mb-4 relative bg-slate-800 rounded-2xl shadow-inner border border-slate-700 flex justify-center items-center">
              <svg width="150" height="150" viewBox="0 0 200 250" className="stroke-slate-300">
                  <line x1="20" y1="230" x2="100" y2="230" strokeWidth="6" strokeLinecap="round"/>
                  <line x1="60" y1="230" x2="60" y2="20" strokeWidth="6" strokeLinecap="round"/>
                  <line x1="57" y1="20" x2="140" y2="20" strokeWidth="6" strokeLinecap="round"/>
                  <line x1="140" y1="17" x2="140" y2="50" strokeWidth="6" strokeLinecap="round"/>
                  {mistakes > 0 && <circle cx="140" cy="70" r="20" fill="none" strokeWidth="5" />}
                  {mistakes > 1 && <line x1="140" y1="90" x2="140" y2="150" strokeWidth="5" />}
                  {mistakes > 2 && <line x1="140" y1="110" x2="110" y2="130" strokeWidth="5" />}
                  {mistakes > 3 && <line x1="140" y1="110" x2="170" y2="130" strokeWidth="5" />}
                  {mistakes > 4 && <line x1="140" y1="150" x2="110" y2="190" strokeWidth="5" />}
                  {mistakes > 5 && <line x1="140" y1="150" x2="170" y2="190" strokeWidth="5" />}
              </svg>
            </div>

            <div className={`font-bold mb-4 ${mistakes >= maxMistakes - 2 ? 'text-red-400' : 'text-slate-400'}`}>
              剩餘容錯次數: <span className="text-xl">{maxMistakes - mistakes}</span> / {maxMistakes}
            </div>

            <div className="flex gap-2 mb-8 flex-wrap justify-center">
              {status === 'loading' ? <span className="text-indigo-400 animate-pulse">尋找單字中...</span> : 
                targetWord.split('').map((char, i) => (
                  <div key={i} className={`w-10 h-12 flex items-end justify-center text-3xl font-bold uppercase border-b-4 ${guessedLetters.includes(char) || status === 'lost' ? 'border-indigo-400 text-white' : 'border-slate-600 text-transparent'} ${status === 'lost' && !guessedLetters.includes(char) ? 'text-red-500 border-red-500' : ''}`}>
                    {guessedLetters.includes(char) || status === 'lost' ? char : '_'}
                  </div>
                ))
              }
            </div>

            {status === 'playing' && (
              <div className="flex flex-col items-center w-full max-w-2xl">
                <div className="grid grid-cols-7 sm:grid-cols-9 gap-2 w-full">
                  {"abcdefghijklmnopqrstuvwxyz".split('').map(char => {
                    const isGuessed = guessedLetters.includes(char);
                    const isCorrect = targetWord.includes(char);
                    return (
                      <button key={char} onClick={() => guess(char)} disabled={isGuessed} className={`py-3 uppercase font-bold rounded-lg text-lg transition-all ${!isGuessed ? 'bg-slate-700 text-white hover:bg-indigo-600 active:scale-95' : isCorrect ? 'bg-green-600/50 text-green-200 cursor-not-allowed' : 'bg-red-900/60 text-red-300 border border-red-800/50 cursor-not-allowed'}`}>
                        {char}
                      </button>
                    )
                  })}
                </div>
                <div className="text-slate-500 text-xs mt-5 flex items-center gap-2 bg-slate-800/80 px-4 py-2 rounded-full">
                  <span className="text-lg">⌨️</span>
                  <span>支援實體鍵盤操作 (遊戲結束可按 <strong className="text-white">Enter</strong> 重來)</span>
                </div>
              </div>
            )}

            {status === 'fetching_info' && <div className="animate-pulse text-yellow-400 font-bold text-xl mt-4">✨ 正在查詢字典與分析單字中... ✨</div>}

            {(status === 'won' || status === 'lost') && (
              <div className="w-full max-w-md bg-slate-800 p-6 rounded-2xl text-center shadow-2xl border border-slate-700">
                <h2 className={`text-3xl font-black mb-2 ${status==='won'?'text-green-400':'text-red-500'}`}>
                  {status === 'won' ? '🎉 挑戰成功！' : '💀 挑戰失敗'}
                </h2>
                {newCard && (
                  <div className="my-6 text-left">
                    <div className={status === 'lost' ? 'opacity-80 grayscale-[30%]' : ''}>
                      <WordCard card={newCard} />
                    </div>
                  </div>
                )}
                <button onClick={fetchNewWord} className="mt-4 bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-8 rounded-full shadow-lg transition-transform active:scale-95 w-full text-lg flex items-center justify-center gap-2">
                  <span>再猜一次</span><span className="text-sm font-normal bg-indigo-800 px-2 py-0.5 rounded text-indigo-200 border border-indigo-500">Enter</span>
                </button>
              </div>
            )}
          </div>
        );
      }

      // --- 卡牌庫檢視 ---
      function LibraryView({ cards, markCardAsSeen }) {
        const [selectedCard, setSelectedCard] = useState(null);
        if (cards.length === 0) return <div className="text-center text-slate-500 mt-20">還沒有任何卡牌，快去猜單字吧！</div>;
        return (
          <div>
            <h2 className="text-xl font-bold mb-4 flex justify-between items-center">
              <span>🎴 我的卡牌庫</span>
              <span className="text-sm font-normal text-slate-400 bg-slate-800 px-3 py-1 rounded-full border border-slate-700">
                總戰力: <span className="text-yellow-400 font-bold">{cards.reduce((acc, c) => acc + c.atk + c.hp, 0)}</span>
              </span>
            </h2>
            <div className="grid grid-cols-2 md:grid-cols-3 gap-4 pb-10">
              {cards.map(card => (
                <div key={card.id} onClick={() => { setSelectedCard(card); if (card.isNew) markCardAsSeen(card.id); }} className="cursor-pointer transform hover:scale-105 transition-transform relative">
                  {card.isNew && <div className="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] font-black px-2 py-0.5 rounded-full z-10 shadow border border-red-700 animate-bounce">NEW</div>}
                  <WordCard card={card} compact={true} />
                </div>
              ))}
            </div>

            {selectedCard && (
              <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-[100]" onClick={() => setSelectedCard(null)}>
                <div className="bg-slate-800 rounded-2xl w-full max-w-sm border border-slate-600 shadow-2xl overflow-hidden" onClick={e => e.stopPropagation()}>
                  <WordCard card={selectedCard} />
                  <div className="p-4 bg-slate-900 max-h-60 overflow-y-auto">
                    <h3 className="text-sm font-bold text-indigo-400 mb-2 border-b border-slate-700 pb-1">📚 字典定義與詞性</h3>
                    {selectedCard.meanings?.map((m, idx) => (
                      <div key={idx} className="mb-3">
                        <span className="inline-block px-2 py-0.5 bg-slate-700 text-slate-300 rounded text-xs font-bold mb-1">{m.pos}</span>
                        <ul className="list-disc list-inside text-sm text-slate-400">
                          {m.defs.map((def, i) => <li key={i} className="line-clamp-2">{def}</li>)}
                        </ul>
                      </div>
                    ))}
                  </div>
                  <button onClick={() => setSelectedCard(null)} className="w-full py-3 bg-slate-700 hover:bg-slate-600 font-bold text-white transition-colors">關閉</button>
                </div>
              </div>
            )}
          </div>
        );
      }

      // --- 競技場 ---
      function ArenaView({ user, cards }) {
        const [battleState, setBattleState] = useState('menu');
        const [matchData, setMatchData] = useState(null);
        const [battleResult, setBattleResult] = useState(null);

        const myDeck = useMemo(() => [...cards].sort((a, b) => (b.atk + b.hp) - (a.atk + a.hp)).slice(0, 3), [cards]);
        const myPower = myDeck.reduce((acc, c) => acc + c.atk + c.hp, 0);

        const startPvE = () => {
          setBattleState('battling');
          const aiPower = Math.floor(myPower * (0.8 + Math.random() * 0.4));
          setTimeout(() => {
            setMatchData({ opponentName: 'AI 機器人', opponentPower: aiPower });
            setBattleResult(myPower >= aiPower ? 'win' : 'lose');
            setBattleState('result');
          }, 2000);
        };

        const startPvP = async () => {
          if (isLocal) {
            alert("目前是單機模式，無法連線至線上對戰哦！請點擊左側的「對戰 AI」🤖");
            return;
          }
          setBattleState('searching');
          const matchesRef = collection(db, 'artifacts', appId, 'public', 'data', 'arena_matches');
          
          const unsubscribe = onSnapshot(matchesRef, async (snapshot) => {
            if (battleState === 'battling' || battleState === 'result') return;
            const allMatches = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            const waitingMatch = allMatches.find(m => m.status === 'waiting' && m.hostId !== user.uid);

            if (waitingMatch) {
              const matchDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'arena_matches', waitingMatch.id);
              const isWin = myPower >= waitingMatch.hostPower;
              await updateDoc(matchDocRef, {
                guestId: user.uid, guestName: '玩家_' + user.uid.slice(0, 4), guestPower: myPower,
                status: 'resolved', winnerId: isWin ? user.uid : waitingMatch.hostId
              });
              setMatchData({ opponentName: waitingMatch.hostName, opponentPower: waitingMatch.hostPower });
              setBattleResult(isWin ? 'win' : 'lose');
              setBattleState('result');
              unsubscribe();
            } else {
              const existingHost = allMatches.find(m => m.status === 'waiting' && m.hostId === user.uid);
              if (!existingHost) {
                const newMatchRef = doc(matchesRef);
                await setDoc(newMatchRef, {
                  hostId: user.uid, hostName: '玩家_' + user.uid.slice(0, 4), hostPower: myPower,
                  status: 'waiting', createdAt: Date.now()
                });
                const hostSub = onSnapshot(newMatchRef, (docSnap) => {
                   const data = docSnap.data();
                   if (data && data.status === 'resolved') {
                      setMatchData({ opponentName: data.guestName, opponentPower: data.guestPower });
                      setBattleResult(data.winnerId === user.uid ? 'win' : 'lose');
                      setBattleState('result'); hostSub(); 
                   }
                });
              }
            }
          });
        };

        if (battleState === 'searching') return <div className="text-center py-20"><div className="text-6xl animate-spin mb-6">🌀</div><h2 className="text-2xl font-bold animate-pulse text-indigo-400">正在尋找對手...</h2><button onClick={() => setBattleState('menu')} className="mt-8 text-slate-400 underline">取消搜尋</button></div>;
        if (battleState === 'battling') return <div className="text-center py-20"><div className="text-6xl animate-bounce mb-6">⚔️</div><h2 className="text-2xl font-bold text-red-400">戰鬥交鋒中！</h2></div>;
        if (battleState === 'result') return (
          <div className="text-center py-10">
            <h2 className={`text-5xl font-black mb-4 ${battleResult === 'win' ? 'text-yellow-400' : 'text-slate-500'}`}>{battleResult === 'win' ? '🏆 勝利！' : '💀 敗北'}</h2>
            <div className="flex justify-center items-center gap-6 my-8">
              <div className="bg-slate-800 p-4 rounded-xl border-2 border-indigo-500"><div className="text-sm text-slate-400">我的戰力</div><div className="text-3xl font-bold">{myPower}</div></div>
              <div className="text-2xl font-black text-red-500">VS</div>
              <div className="bg-slate-800 p-4 rounded-xl border-2 border-slate-600"><div className="text-sm text-slate-400">{matchData.opponentName}</div><div className="text-3xl font-bold">{matchData.opponentPower}</div></div>
            </div>
            <button onClick={() => setBattleState('menu')} className="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-8 rounded-full shadow-lg">返回競技場大廳</button>
          </div>
        );

        return (
          <div className="space-y-6">
            <div className="bg-gradient-to-br from-indigo-900 to-slate-800 p-6 rounded-2xl border border-indigo-500/30 text-center shadow-xl">
              <h2 className="text-2xl font-black mb-2 text-indigo-300">⚔️ 我的出戰陣容</h2>
              <div className="flex justify-center gap-2 mb-4">{myDeck.map((c, i) => <div key={i} className="w-1/3 transform scale-90 -mx-2"><WordCard card={c} compact={true}/></div>)}</div>
              <div className="inline-block bg-slate-900/50 px-6 py-2 rounded-full border border-slate-700">總戰鬥力: <span className="text-xl font-bold text-yellow-400">{myPower}</span></div>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <button onClick={startPvE} className="bg-slate-800 hover:bg-slate-700 border border-slate-600 p-6 rounded-2xl flex flex-col items-center">
                <span className="text-5xl mb-3">🤖</span><span className="text-xl font-bold">對戰 AI</span>
              </button>
              <button onClick={startPvP} className="bg-indigo-800 hover:bg-indigo-700 border border-indigo-500 p-6 rounded-2xl flex flex-col items-center">
                <span className="text-5xl mb-3">🌍</span><span className="text-xl font-bold text-white">線上配對</span>
              </button>
            </div>
          </div>
        );
      }

      // --- 卡牌樣式 ---
      function WordCard({ card, compact = false }) {
        const bgColors = {
          1: 'from-slate-600 to-slate-700 border-slate-500', 2: 'from-green-600 to-emerald-800 border-green-500',
          3: 'from-blue-600 to-indigo-800 border-blue-500', 4: 'from-purple-600 to-fuchsia-800 border-purple-500',
          5: 'from-yellow-500 to-orange-700 border-yellow-400', 6: 'from-red-600 to-rose-900 border-red-500',
        };
        const cardStyle = bgColors[card.stars] || bgColors[1];
        return (
          <div className={`bg-gradient-to-br ${cardStyle} p-1 rounded-xl shadow-lg relative flex flex-col`}>
            <div className="absolute inset-0 bg-gradient-to-tr from-transparent via-white/5 to-white/20 pointer-events-none"></div>
            <div className="bg-slate-900/60 backdrop-blur-sm rounded-lg p-3 flex-1 flex flex-col">
              <div className={`text-yellow-400 tracking-widest text-center ${compact ? 'text-xs mb-1' : 'text-sm mb-2'}`}>
                {'⭐'.repeat(card.stars) + '☆'.repeat(6 - card.stars)}
              </div>
              <div className={`font-black uppercase text-white text-center break-words leading-tight ${compact ? (card.word.length > 8 ? 'text-lg' : 'text-xl') : (card.word.length > 8 ? 'text-2xl' : 'text-4xl')}`}>{card.word}</div>
              <div className={`text-slate-300 text-center font-medium mt-1 mb-3 ${compact ? 'text-xs line-clamp-1' : 'text-lg'}`}>{card.translation}</div>
              <div className="mt-auto"></div>
              <div className="flex justify-between items-center bg-slate-900/80 rounded px-2 py-1 mt-2">
                 <div className="flex items-center text-red-400 font-bold"><span className={`${compact ? 'text-xs' : 'text-sm'} mr-1`}>❤️</span><span className={compact ? 'text-sm' : 'text-lg'}>{card.hp}</span></div>
                 <div className="flex items-center text-blue-400 font-bold"><span className={`${compact ? 'text-xs' : 'text-sm'} mr-1`}>⚔️</span><span className={compact ? 'text-sm' : 'text-lg'}>{card.atk}</span></div>
              </div>
            </div>
          </div>
        );
      }

      // 將 React 元件繪製到畫面上
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    }

    // 等待 Firebase 載入完成後再啟動遊戲
    if (window.FB) {
      startApp();
    } else {
      window.addEventListener('firebaseLoaded', startApp);
    }
  </script>
</body>
</html>
